<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FreshMart - Premium Admin Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Animated Multi-color Gradient */
            background: linear-gradient(-45deg, #2ecc71, #27ae60, #1abc9c, #16a085);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            overflow: hidden;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .login-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px); /* કાચ જેવી ઇફેક્ટ */
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 400px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
        }

        .login-box:hover {
            transform: translateY(-5px); /* હોવર કરવાથી થોડું ઉપર આવશે */
        }

        .login-box i.main-icon {
            font-size: 3rem;
            color: #27ae60;
            margin-bottom: 15px;
            background: #e8f5e9;
            padding: 20px;
            border-radius: 50%;
        }

        .login-box h2 { 
            color: #2c3e50; 
            margin-bottom: 30px; 
            font-size: 1.8rem;
            letter-spacing: 1px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #27ae60;
        }

        .login-box input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        .login-box input:focus {
            border-color: #27ae60;
            box-shadow: 0 0 10px rgba(39, 174, 96, 0.2);
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #219150;
            box-shadow: 0 10px 20px rgba(39, 174, 96, 0.4);
            letter-spacing: 2px;
        }

        #msg {
            color: #e74c3c;
            margin-top: 15px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* સુંદર નાનું એનિમેશન */
        .fade-in {
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="login-box fade-in">
    <i class="fa-solid fa-user-shield main-icon"></i>
    <h2>Admin Login</h2>
    <form id="loginForm">
        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="username" value="meet purohit" placeholder="Username" required>
        </div>
        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="password" value="Meet@07" placeholder="Password" required>
        </div>
        <button type="submit" class="login-btn">Secure Login <i class="fa-solid fa-arrow-right"></i></button>
    </form>
    <p id="msg"></p>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;

        if(user === "meet purohit" && pass === "Meet@07") {
            // લોગિન બટન પર એનિમેશન બતાવવા
            const btn = document.querySelector('.login-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Logging in...';
            
            setTimeout(() => {
                localStorage.setItem('isAdminLoggedIn', 'true');
                window.location.href = "admin.html"; 
            }, 1000);
        } else {
            document.getElementById('msg').innerHTML = '<i class="fa-solid fa-circle-exclamation"></i> ખોટું યુઝરનેમ કે પાસવર્ડ છે!';
        }
    });
</script>

</body>
</html>
