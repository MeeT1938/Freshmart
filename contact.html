<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FreshMart</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f9f4; }

        .contact-container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        .contact-container h1 {
            color: #27ae60;
            margin-bottom: 10px;
            font-size: 2.2rem;
        }

        .contact-container p {
            color: #666;
            margin-bottom: 30px;
        }

        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
            outline: none;
            transition: 0.3s;
        }

        /* Input focus effect */
        .contact-form input:focus, .contact-form textarea:focus {
            border-color: #27ae60;
            box-shadow: 0 0 8px rgba(39, 174, 96, 0.2);
        }

        /* Professional Send Button with Hover Effect */
        .send-btn {
            width: 100%;
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.3);
        }

        .send-btn:hover {
            background: #219150;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(39, 174, 96, 0.4);
        }

        /* Success Message Popup */
        #msgPopup {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.3);
            z-index: 2000;
            width: 320px;
            border-top: 5px solid #27ae60;
        }

        #msgPopup i { font-size: 3.5rem; color: #27ae60; margin-bottom: 15px; }
    </style>
</head>
<body>

<header>
    <div class="logo"><h1><i class="fa-solid fa-basket-shopping"></i> FreshMart</h1></div>
    <nav>
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="cart.html">Cart</a>
        <a href="contact.html" style="color: #27ae60;">Contact</a>
    </nav>
</header>

<div class="contact-container">
    <h1>Get In Touch</h1>
    <p>Have questions? We'd love to hear from you!</p>
    
    <form class="contact-form" onsubmit="sendContactMessage(event)">
        <input type="text" id="cName" placeholder="Your Full Name" required>
        <input type="email" id="cEmail" placeholder="Your Email Address" required>
        <textarea id="cMessage" rows="5" placeholder="Type your message here..." required></textarea>
        <button type="submit" class="send-btn">Send Message <i class="fa-solid fa-paper-plane"></i></button>
    </form>
</div>

<div id="msgPopup">
    <i class="fa-solid fa-envelope-circle-check"></i>
    <h2 style="color: #27ae60;">Message Sent!</h2>
    <p style="margin: 10px 0; color: #666;">Thank you for contacting us. We will get back to you soon.</p>
    <p style="font-size: 0.8rem; color: #999;">Redirecting to home in 3 seconds...</p>
</div>

<script>
    function sendContactMessage(event) {
        event.preventDefault(); // પેજ રિફ્રેશ થતું અટકાવવા

        // ૧. ફોર્મમાંથી ડેટા લેવો
        const name = document.getElementById('cName').value;
        const email = document.getElementById('cEmail').value;
        const problem = document.getElementById('cMessage').value;

        // ૨. નવો પ્રોબ્લેમ ઓબ્જેક્ટ બનાવવો
        const newEntry = {
            name: name,
            email: email,
            problem: problem,
            status: "Unsolved" // બાય ડિફોલ્ટ સ્ટેટસ
        };

        // ૩. LocalStorage માંથી જૂનો ડેટા લાવવો (જો હોય તો)
        let currentProblems = JSON.parse(localStorage.getItem('userProblems')) || [];

        // ૪. નવો ડેટા એરે (Array) માં ઉમેરવો
        currentProblems.push(newEntry);

        // ૫. પાછું સેવ કરવું
        localStorage.setItem('userProblems', JSON.stringify(currentProblems));

        // સક્સેસ પોપઅપ બતાવવું
        document.getElementById('msgPopup').style.display = 'block';

        // ૩ સેકન્ડ પછી હોમ પેજ પર મોકલી દેવું
        setTimeout(() => {
            window.location.href = "index.html";
        }, 3000);
    }
</script>

</body>
</html>
